<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Cueva Thalía">
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="gn"/>
      <feBlend in="SourceGraphic" in2="gn" mode="multiply" result="out"/>
    </filter>
  </defs>
  <rect width="32" height="32" rx="3" fill="#F5F0E6"/>
  <rect x="1" y="1" width="30" height="30" rx="2" fill="none" stroke="#C9B896" stroke-width="0.6" opacity="0.5"/>
  <text
    filter="url(#grain)"
    x="16"
    y="21.5"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15"
    font-weight="600"
    fill="#B85C38"
    letter-spacing="-1.2"
  >CT</text>
</svg>
